<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 708 1536" role="img" aria-label="Сканирование штрихкода на упаковке препарата">
  <defs>
    <linearGradient id="cameraBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0a5b64"/>
      <stop offset=".48" stop-color="#102b36"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <radialGradient id="lensLight" cx=".44" cy=".38" r=".62">
      <stop stop-color="#2bd6dc" stop-opacity=".24"/>
      <stop offset=".55" stop-color="#2bd6dc" stop-opacity=".06"/>
      <stop offset="1" stop-color="#071018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="packBody" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f6feff"/>
      <stop offset=".48" stop-color="#dff6f8"/>
      <stop offset="1" stop-color="#c2e9ef"/>
    </linearGradient>
    <linearGradient id="packAccent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#b7f5f0"/>
      <stop offset="1" stop-color="#d9e3ff"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#02070b" flood-opacity=".36"/>
    </filter>
    <filter id="scanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="708" height="1536" fill="#071018"/>
  <rect width="708" height="1536" fill="url(#cameraBg)"/>
  <rect width="708" height="1536" fill="url(#lensLight)"/>

  <g opacity=".16">
    <circle cx="86" cy="156" r="56" fill="#ffffff"/>
    <circle cx="624" cy="1280" r="126" fill="#22c8d1"/>
    <circle cx="110" cy="1218" r="92" fill="#4d7dff"/>
  </g>

  <rect x="48" y="196" width="612" height="1144" rx="56" fill="#0b141d" opacity=".5"/>
  <rect x="66" y="214" width="576" height="1108" rx="48" fill="none" stroke="#dffcff" stroke-opacity=".14" stroke-width="2"/>

  <g filter="url(#softShadow)" transform="rotate(-5 354 746)">
    <rect x="104" y="548" width="500" height="396" rx="38" fill="url(#packBody)"/>
    <rect x="104" y="548" width="500" height="122" rx="38" fill="url(#packAccent)"/>
    <path d="M104 632h500" stroke="#b7d8df" stroke-width="2" opacity=".55"/>
    <rect x="148" y="712" width="150" height="150" rx="34" fill="#e9fbf5"/>
    <path d="M188 787h70M223 752v70" stroke="#22c8d1" stroke-width="16" stroke-linecap="round"/>
    <circle cx="494" cy="622" r="44" fill="#22c8d1" opacity=".9"/>
    <path d="M472 622h44M494 600v44" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
    <rect x="330" y="734" width="210" height="104" rx="18" fill="#f7ffff" stroke="#bedae0" stroke-width="2"/>
  </g>

  <rect x="222" y="661" width="264" height="214" rx="24" fill="#f9ffff" stroke="#e3fbff" stroke-width="4"/>
  <g fill="#071018">
    <rect x="248" y="697" width="12" height="132"/>
    <rect x="269" y="697" width="6" height="132"/>
    <rect x="284" y="697" width="18" height="132"/>
    <rect x="314" y="697" width="8" height="132"/>
    <rect x="332" y="697" width="24" height="132"/>
    <rect x="368" y="697" width="7" height="132"/>
    <rect x="388" y="697" width="15" height="132"/>
    <rect x="418" y="697" width="9" height="132"/>
    <rect x="444" y="697" width="16" height="132"/>
  </g>

  <rect x="120" y="506" width="468" height="480" rx="44" fill="none" stroke="#22c8d1" stroke-width="4" stroke-dasharray="18 18" opacity=".72"/>
  <path d="M138 638v-92h92M478 546h92v92M570 854v92h-92M230 946h-92v-92" fill="none" stroke="#f2ffff" stroke-width="11" stroke-linecap="round" filter="url(#scanGlow)"/>
  <line x1="154" y1="768" x2="554" y2="768" stroke="#22c8d1" stroke-width="6" filter="url(#scanGlow)"/>
  <circle cx="354" cy="768" r="172" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="2"/>
</svg>
